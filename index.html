<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogues IAP 2026</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            text-align: center;
            margin: 0;
            padding: 50px 20px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        h1 {
            color: #003366;
        }

        p {
            color: #555;
            margin-bottom: 30px;
        }

        .btn {
            display: block;
            margin: 15px auto;
            padding: 15px 25px;
            width: 80%;
            max-width: 400px;
            text-decoration: none;
            background: #0056b3;
            color: white;
            font-size: 18px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #003d80;
        }

        .footer {
            margin-top: 30px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>📚 Catalogues IAP 2026</h1>

    <p>
        Sélectionnez le catalogue souhaité :
    </p>

    <a class="btn" href="Catalogue IAP-FR-2026.pdf" target="_blank">
        🇫🇷 Catalogue Français 2026
    </a>

    <a class="btn" href="Catalogue IAP-ENG_2026.pdf" target="_blank">
        🇬🇧 Catalogue English 2026
    </a>

    <div class="footer">
        IAP 2026
